<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>EVR Proxy</title>

    <link rel="shortcut icon" href="favicon.webp" />

    <!-- Scramjet core (proxy functionality stays the same) -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>

    <!-- Fonts / styles -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />

    <!-- App scripts (unchanged proxy wiring) -->
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
  </head>

  <body>
    <div class="evr-root">
      <!-- Fake browser chrome bar -->
      <div class="evr-chrome">
        <div class="chrome-left">
          <button class="chrome-btn" aria-hidden="true"></button>
          <button class="chrome-btn" aria-hidden="true"></button>
          <button class="chrome-btn" aria-hidden="true"></button>
        </div>
        <div class="chrome-omnibox">
          <span class="chrome-lock"></span>
          <span class="chrome-text">EVR Proxy • powered by Scramjet</span>
        </div>
        <div class="chrome-right">
          <span class="chrome-dot"></span>
        </div>
      </div>

      <!-- New tab content -->
      <main class="evr-main">
        <section class="evr-center">
          <div class="evr-time-row">
            <div id="evr-clock" class="evr-clock">--:--</div>
            <div class="evr-battery" aria-label="Session battery">
              <div class="evr-battery-shell">
                <div
                  id="evr-battery-fill"
                  class="evr-battery-fill battery-green"
                ></div>
              </div>
              <div class="evr-battery-cap"></div>
              <span id="evr-battery-text" class="evr-battery-text">100%</span>
            </div>
          </div>

          <!-- EVR search / URL bar (wired to Scramjet) -->
          <form id="sj-form" class="evr-search-card">
            <input
              id="sj-search-engine"
              value="https://www.google.com/search?q=%s"
              type="hidden"
            />
            <div class="evr-search-inner">
              <span class="evr-search-icon"></span>
              <input
                id="sj-address"
                type="text"
                placeholder="Search or enter a site URL"
                autocomplete="off"
              />
            </div>
          </form>

          <p class="evr-hint">
            EVR will auto‑detect URLs vs searches • powered by Scramjet core.
          </p>

          <div class="evr-status">
            <p id="sj-error" class="status-error"></p>
            <pre id="sj-error-code" class="status-code"></pre>
          </div>
        </section>

        <footer class="evr-footer">
          <span>EVR Proxy &mdash; Powered by Scramjet </span>
        </footer>
      </main>
    </div>
  </body>
</html>
